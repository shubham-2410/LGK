name: Build & Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Clear Vite cache
        run: rm -rf node_modules/.vite client/node_modules/.vite

      - name: Build project
        env:
          VITE_API_BASE: https://api.lgk.com
          NODE_ENV: production
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: npm run build

      - name: Verify build output
        run: ls -la dist/public

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: 68.178.149.21
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: dist/public/
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/*.map
            **/*.cjs

